---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/k8s.mariadb.com/pointintimerecovery_v1alpha1.json
apiVersion: k8s.mariadb.com/v1alpha1
kind: PointInTimeRecovery
metadata:
  name: auntalma-mariadb-pitr
  namespace: business-system
spec:
  # MariaDB instance to archive binlogs from
  mariaDbRef:
    name: auntalma-mariadb

  # Compress binlogs before uploading
  compression: gzip

  # Archive binlogs every 5 minutes (balance between RPO and overhead)
  archiveTimeout: 5m

  # S3-compatible storage (TrueNAS MinIO on LAN)
  storage:
    s3:
      bucket: mariadb-binlog
      prefix: auntalma/
      endpoint: 192.168.50.17:9000
      accessKeyIdSecretKeyRef:
        name: cnpg-minio-credentials
        key: ACCESS_KEY_ID
      secretAccessKeySecretKeyRef:
        name: cnpg-minio-credentials
        key: SECRET_ACCESS_KEY
