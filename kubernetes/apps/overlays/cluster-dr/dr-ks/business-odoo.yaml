---
# DR: Odoo — no staging dependency, no rook-ceph
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: odoo
  namespace: business-system
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 15m
  path: "./apps/base/business-system/odoo/app"
  prune: true
  wait: false
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age-secret
  dependsOn:
    - name: cnpg
      namespace: database-system
    - name: envoy-gateway-gateway-api
      namespace: network-system
    - name: onepassword
      namespace: external-secrets
