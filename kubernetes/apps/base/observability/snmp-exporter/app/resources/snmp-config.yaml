---
apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-exporter-config
data:
  snmp.yml: |
    auths:
      public_v2:
        community: "${SNMP_COMMUNITY}"
        security_level: noAuthNoPriv
        auth_protocol: MD5
        priv_protocol: DES
        version: 2

    modules:
      # APC UPS module - SRT3000RMXLI via AP9631 network card
      apcups:
        walk:
          - 1.3.6.1.4.1.318.1.1.1.2.1     # upsBasicBatteryStatus
          - 1.3.6.1.4.1.318.1.1.1.2.2     # upsAdvBatteryRunTimeRemaining
          - 1.3.6.1.4.1.318.1.1.1.2.3.1   # upsHighPrecBatteryCapacity
          - 1.3.6.1.4.1.318.1.1.1.2.11    # upsHighPrecBatteryTemperature
          - 1.3.6.1.4.1.318.1.1.1.3.2.1   # upsHighPrecInputFrequency
          - 1.3.6.1.4.1.318.1.1.1.3.3.1   # upsHighPrecInputVoltage
          - 1.3.6.1.4.1.318.1.1.1.4.1     # upsBasicOutputStatus
          - 1.3.6.1.4.1.318.1.1.1.4.2.1   # upsHighPrecOutputVoltage
          - 1.3.6.1.4.1.318.1.1.1.4.2.4   # upsHighPrecOutputCurrent
          - 1.3.6.1.4.1.318.1.1.1.4.2.6   # upsHighPrecOutputPower
          - 1.3.6.1.4.1.318.1.1.1.4.2.8   # upsHighPrecOutputEfficiency
          - 1.3.6.1.4.1.318.1.1.1.4.3.1   # upsHighPrecOutputLoad
        metrics:
          - name: upsBasicBatteryStatus
            oid: 1.3.6.1.4.1.318.1.1.1.2.1
            type: gauge
            help: "UPS battery status - 1:unknown 2:batteryNormal 3:batteryLow 4:batteryInFaultCondition"
          - name: upsHighPrecBatteryCapacity
            oid: 1.3.6.1.4.1.318.1.1.1.2.3.1
            type: gauge
            help: "Battery capacity in tenths of percent"
          - name: upsHighPrecBatteryTemperature
            oid: 1.3.6.1.4.1.318.1.1.1.2.11
            type: gauge
            help: "Battery temperature in tenths of degrees Celsius"
          - name: upsAdvBatteryRunTimeRemaining
            oid: 1.3.6.1.4.1.318.1.1.1.2.2
            type: gauge
            help: "Estimated remaining runtime in hundredths of seconds (timeticks)"
          - name: upsHighPrecInputVoltage
            oid: 1.3.6.1.4.1.318.1.1.1.3.3.1
            type: gauge
            help: "Input voltage in tenths of volts"
          - name: upsHighPrecInputFrequency
            oid: 1.3.6.1.4.1.318.1.1.1.3.2.1
            type: gauge
            help: "Input frequency in tenths of Hz"
          - name: upsBasicOutputStatus
            oid: 1.3.6.1.4.1.318.1.1.1.4.1
            type: gauge
            help: "UPS output status - 1:unknown 2:onLine 3:onBattery 4:onSmartBoost 5:timedSleeping 6:softwareBypass 12:onSmartTrim"
          - name: upsHighPrecOutputVoltage
            oid: 1.3.6.1.4.1.318.1.1.1.4.2.1
            type: gauge
            help: "Output voltage in tenths of volts"
          - name: upsHighPrecOutputLoad
            oid: 1.3.6.1.4.1.318.1.1.1.4.3.1
            type: gauge
            help: "Output load in tenths of percent"
          - name: upsHighPrecOutputCurrent
            oid: 1.3.6.1.4.1.318.1.1.1.4.2.4
            type: gauge
            help: "Output current in tenths of amps"
          - name: upsHighPrecOutputPower
            oid: 1.3.6.1.4.1.318.1.1.1.4.2.6
            type: gauge
            help: "Output power in watts"
          - name: upsHighPrecOutputEfficiency
            oid: 1.3.6.1.4.1.318.1.1.1.4.2.8
            type: gauge
            help: "Output efficiency in tenths of percent"

      # APC UPS module with environmental sensors (humidity probe)
      apcups_env:
        walk:
          - 1.3.6.1.4.1.318.1.1.1.2.1     # upsBasicBatteryStatus
          - 1.3.6.1.4.1.318.1.1.1.2.2     # upsAdvBatteryRunTimeRemaining
          - 1.3.6.1.4.1.318.1.1.1.2.3.1   # upsHighPrecBatteryCapacity
          - 1.3.6.1.4.1.318.1.1.1.2.11    # upsHighPrecBatteryTemperature
          - 1.3.6.1.4.1.318.1.1.1.3.2.1   # upsHighPrecInputFrequency
          - 1.3.6.1.4.1.318.1.1.1.3.3.1   # upsHighPrecInputVoltage
          - 1.3.6.1.4.1.318.1.1.1.4.1     # upsBasicOutputStatus
          - 1.3.6.1.4.1.318.1.1.1.4.2.1   # upsHighPrecOutputVoltage
          - 1.3.6.1.4.1.318.1.1.1.4.2.4   # upsHighPrecOutputCurrent
          - 1.3.6.1.4.1.318.1.1.1.4.2.6   # upsHighPrecOutputPower
          - 1.3.6.1.4.1.318.1.1.1.4.2.8   # upsHighPrecOutputEfficiency
          - 1.3.6.1.4.1.318.1.1.1.4.3.1   # upsHighPrecOutputLoad
          - 1.3.6.1.4.1.318.1.1.10.2.3.2  # uioSensorStatusTable (env sensors)
        metrics:
          - name: upsBasicBatteryStatus
            oid: 1.3.6.1.4.1.318.1.1.1.2.1
            type: gauge
            help: "UPS battery status - 1:unknown 2:batteryNormal 3:batteryLow 4:batteryInFaultCondition"
          - name: upsHighPrecBatteryCapacity
            oid: 1.3.6.1.4.1.318.1.1.1.2.3.1
            type: gauge
            help: "Battery capacity in tenths of percent"
          - name: upsHighPrecBatteryTemperature
            oid: 1.3.6.1.4.1.318.1.1.1.2.11
            type: gauge
            help: "Battery temperature in tenths of degrees Celsius"
          - name: upsAdvBatteryRunTimeRemaining
            oid: 1.3.6.1.4.1.318.1.1.1.2.2
            type: gauge
            help: "Estimated remaining runtime in hundredths of seconds (timeticks)"
          - name: upsHighPrecInputVoltage
            oid: 1.3.6.1.4.1.318.1.1.1.3.3.1
            type: gauge
            help: "Input voltage in tenths of volts"
          - name: upsHighPrecInputFrequency
            oid: 1.3.6.1.4.1.318.1.1.1.3.2.1
            type: gauge
            help: "Input frequency in tenths of Hz"
          - name: upsBasicOutputStatus
            oid: 1.3.6.1.4.1.318.1.1.1.4.1
            type: gauge
            help: "UPS output status - 1:unknown 2:onLine 3:onBattery 4:onSmartBoost 5:timedSleeping 6:softwareBypass 12:onSmartTrim"
          - name: upsHighPrecOutputVoltage
            oid: 1.3.6.1.4.1.318.1.1.1.4.2.1
            type: gauge
            help: "Output voltage in tenths of volts"
          - name: upsHighPrecOutputLoad
            oid: 1.3.6.1.4.1.318.1.1.1.4.3.1
            type: gauge
            help: "Output load in tenths of percent"
          - name: upsHighPrecOutputCurrent
            oid: 1.3.6.1.4.1.318.1.1.1.4.2.4
            type: gauge
            help: "Output current in tenths of amps"
          - name: upsHighPrecOutputPower
            oid: 1.3.6.1.4.1.318.1.1.1.4.2.6
            type: gauge
            help: "Output power in watts"
          - name: upsHighPrecOutputEfficiency
            oid: 1.3.6.1.4.1.318.1.1.1.4.2.8
            type: gauge
            help: "Output efficiency in tenths of percent"
          - name: uioSensorStatusTemperature
            oid: 1.3.6.1.4.1.318.1.1.10.2.3.2.1.4
            type: gauge
            help: "Environmental sensor temperature in tenths of degrees Celsius"
            indexes:
              - labelname: sensor_index
                type: gauge
            lookups:
              - labels:
                  - sensor_index
                labelname: sensor_name
                oid: 1.3.6.1.4.1.318.1.1.10.2.3.2.1.2
                type: DisplayString
          - name: uioSensorStatusHumidity
            oid: 1.3.6.1.4.1.318.1.1.10.2.3.2.1.6
            type: gauge
            help: "Environmental sensor humidity in tenths of percent RH"
            indexes:
              - labelname: sensor_index
                type: gauge
            lookups:
              - labels:
                  - sensor_index
                labelname: sensor_name
                oid: 1.3.6.1.4.1.318.1.1.10.2.3.2.1.2
                type: DisplayString

      # APC Automatic Transfer Switch - AP7721
      apcats:
        walk:
          - 1.3.6.1.4.1.318.1.1.8.1       # atsStatusSelectedSource
          - 1.3.6.1.4.1.318.1.1.8.5.3.3   # atsInputVoltage
          - 1.3.6.1.4.1.318.1.1.8.5.3.2   # atsInputFrequency
          - 1.3.6.1.4.1.318.1.1.8.5.4.2   # atsOutputCurrent
          - 1.3.6.1.4.1.318.1.1.8.5.4.3   # atsOutputPower
          - 1.3.6.1.4.1.318.1.1.8.5.4.5   # atsOutputVoltage
        metrics:
          - name: atsStatusSelectedSource
            oid: 1.3.6.1.4.1.318.1.1.8.1
            type: gauge
            help: "Active input source - 1:sourceA 2:sourceB"
          - name: atsInputVoltage
            oid: 1.3.6.1.4.1.318.1.1.8.5.3.3
            type: gauge
            help: "Input voltage per source in tenths of volts"
            indexes:
              - labelname: source_index
                type: gauge
          - name: atsInputFrequency
            oid: 1.3.6.1.4.1.318.1.1.8.5.3.2
            type: gauge
            help: "Input frequency per source in tenths of Hz"
            indexes:
              - labelname: source_index
                type: gauge
          - name: atsOutputCurrent
            oid: 1.3.6.1.4.1.318.1.1.8.5.4.2
            type: gauge
            help: "Output current in tenths of amps"
          - name: atsOutputPower
            oid: 1.3.6.1.4.1.318.1.1.8.5.4.3
            type: gauge
            help: "Output power in watts"
          - name: atsOutputVoltage
            oid: 1.3.6.1.4.1.318.1.1.8.5.4.5
            type: gauge
            help: "Output voltage in tenths of volts"
