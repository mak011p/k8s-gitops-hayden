---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: auntalma-opensearch
  namespace: business-system
spec:
  interval: 15m
  chart:
    spec:
      chart: opensearch
      version: 2.32.0
      sourceRef:
        kind: HelmRepository
        name: opensearch-charts
        namespace: business-system
  install:
    timeout: 10m
    replace: true
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace
  test:
    enable: false
  rollback:
    recreate: true
    force: true
    cleanupOnFail: true
  uninstall:
    keepHistory: false
  driftDetection:
    mode: enabled
  maxHistory: 3
  values:
    # OpenSearch 2.19.1 for Magento 2.4.8-p3 compatibility
    clusterName: auntalma-opensearch
    nodeGroup: master
    masterService: auntalma-opensearch
    singleNode: true
    replicas: 1

    # Resources
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        memory: 2Gi

    # JVM heap
    opensearchJavaOpts: "-Xmx512m -Xms512m"

    # Persistence
    persistence:
      enabled: true
      storageClass: ceph-block
      size: 50Gi

    # Disable security plugin (internal cluster use)
    extraEnvs:
      - name: DISABLE_INSTALL_DEMO_CONFIG
        value: "true"
      - name: DISABLE_SECURITY_PLUGIN
        value: "true"

    config:
      opensearch.yml: |
        cluster.name: auntalma-opensearch
        network.host: 0.0.0.0
        discovery.type: single-node
        node.store.allow_mmap: false

    # Disable sysctlInit (requires privileged, not needed with allow_mmap false)
    sysctlInit:
      enabled: false

    # Service
    service:
      type: ClusterIP

    # Disable vanilla NetworkPolicies (use CiliumNetworkPolicy instead)
    networkPolicy:
      create: false

    # ServiceMonitor for Prometheus
    serviceMonitor:
      enabled: false
