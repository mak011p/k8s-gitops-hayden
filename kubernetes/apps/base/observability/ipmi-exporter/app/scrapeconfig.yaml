---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/scrapeconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: ipmi-exporter
spec:
  scrapeInterval: 60s
  scrapeTimeout: 30s
  staticConfigs:
    - targets:
        # ASRock B650D4U-2L2T/BCM BMC IPs (worker nodes)
        - 192.168.50.19
        - 192.168.50.253
        - 192.168.50.18
      labels:
        job: ipmi-exporter
        __param_module: default
    - targets:
        # Gigabyte MC13-LE3 BMC IP (TrueNAS)
        - 192.168.50.12
      labels:
        job: ipmi-exporter
        __param_module: truenas
  metricsPath: /ipmi
  relabelings:
    - sourceLabels: [__address__]
      targetLabel: __param_target
    - sourceLabels: [__param_target]
      targetLabel: instance
    - targetLabel: __address__
      replacement: ipmi-exporter.observability.svc.cluster.local:9290
