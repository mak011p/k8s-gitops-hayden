---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: roundcube-db-weekly
  namespace: business-system
spec:
  # Weekly backup: Sunday at 02:00 Melbourne time (AEDT)
  # 02:00 AEDT = 15:00 UTC Saturday (UTC+11 in summer)
  # CNPG uses 6-field cron: second minute hour day-of-month month day-of-week
  schedule: "0 0 15 * * SAT"
  backupOwnerReference: self
  cluster:
    name: roundcube-db
  immediate: true
