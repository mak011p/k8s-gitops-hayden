---
# CiliumNetworkPolicy for auntalma Magento pods
# Vanilla K8s NetworkPolicy causes DNS packet loss on Cilium (eBPF conntrack race)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: auntalma-app
  namespace: business-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: auntalma
  ingress:
    # Envoy Gateway proxy pods
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network-system
            gateway.envoyproxy.io/owning-gateway-name: envoy-external
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Prometheus metrics scraping
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # MariaDB
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: business-system
            app.kubernetes.io/instance: auntalma-mariadb
      toPorts:
        - ports:
            - port: "3306"
              protocol: TCP
    # Redis
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: business-system
            app.kubernetes.io/instance: auntalma-redis
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    # OpenSearch
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: business-system
            app.kubernetes.io/instance: hayden-opensearch
      toPorts:
        - ports:
            - port: "9200"
              protocol: TCP
    # RabbitMQ
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: business-system
            app.kubernetes.io/instance: auntalma-rabbitmq
      toPorts:
        - ports:
            - port: "5672"
              protocol: TCP
    # External HTTPS (Algolia, Stripe, payment gateways, etc.)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
