---
# NetworkPolicy to restrict access to MCP servers
# Only kagent pods can communicate with MCP servers
# NOTE: Cilium enforces default-deny on ALL directions once a pod is
# policy-selected, even if policyTypes only lists Ingress. Therefore we
# must include Egress with explicit allow rules for each MCP server's
# backend dependencies (Odoo HTTP, PostgreSQL, SendGrid API, DNS).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: odoo-mcp-isolation
  namespace: ai-system
  labels:
    app.kubernetes.io/component: security
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: odoo-mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from kagent helm release pods (controller, ui, etc)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: kagent
      ports:
        - protocol: TCP
          port: 8000
    # Allow traffic from kagent-managed agent pods (odoo-assistant, flux-troubleshooter, sendgrid-assistant)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: kagent
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Odoo XML-RPC (business-system namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: business-system
      ports:
        - protocol: TCP
          port: 8071
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sendgrid-mcp-isolation
  namespace: ai-system
  labels:
    app.kubernetes.io/component: security
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sendgrid-mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from kagent helm release pods
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: kagent
      ports:
        - protocol: TCP
          port: 8000
    # Allow traffic from kagent-managed agent pods
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: kagent
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # SendGrid API (HTTPS)
    - ports:
        - protocol: TCP
          port: 443
