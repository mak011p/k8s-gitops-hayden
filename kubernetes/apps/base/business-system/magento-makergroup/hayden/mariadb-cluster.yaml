---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/k8s.mariadb.com/mariadb_v1alpha1.json
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: hayden-mariadb
  namespace: business-system
spec:
  # MariaDB 10.6 — matches production; supported by Magento 2.4.8-p3 (10.2-10.6, 11.4)
  # 10.11 is NOT in the supported list for 2.4.8-p3 and causes indexer failures
  image: mariadb:10.6

  # Root password from secret
  rootPasswordSecretKeyRef:
    name: hayden-mariadb-superuser
    key: password
    generate: false

  # Auto-update data-plane (agent/init containers) on operator upgrade
  updateStrategy:
    type: ReplicasFirstPrimaryLast
    autoUpdateDataPlane: true

  # PITR — binlog archival to TrueNAS MinIO (s3://mariadb-binlog/hayden/)
  pointInTimeRecoveryRef:
    name: hayden-mariadb-pitr

  # Primary-replica replication (replaces Galera)
  # - Better write performance (no certification overhead)
  # - Compatible with Magento reindex (MEMORY tables, bulk DDL)
  # - Enables PITR via binlog archival
  # - SemiSync for near-zero RPO on failover
  replication:
    enabled: true
    primary:
      podIndex: 0
      autoFailover: true
    replica:
      replPasswordSecretKeyRef:
        name: hayden-mariadb-superuser
        key: password
    syncBinlog: 1

  # 3-node cluster (1 primary + 2 replicas)
  replicas: 3

  # Pod template
  podSecurityContext:
    runAsUser: 0

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: mariadb
              app.kubernetes.io/instance: hayden-mariadb
          topologyKey: kubernetes.io/hostname

  # Resources
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 8Gi

  # Storage
  storage:
    size: 100Gi
    storageClassName: ceph-block
    resizeInUseVolumes: true
    waitForVolumeResize: true

  # Service
  service:
    type: ClusterIP

  # Primary service for writes
  primaryService:
    type: ClusterIP

  # Connection settings
  port: 3306

  # MySQL compatibility
  myCnf: |
    [mariadb]
    bind-address=*
    default_storage_engine=InnoDB
    log_bin=mariadb-bin
    binlog_format=ROW
    innodb_autoinc_lock_mode=2
    innodb_buffer_pool_size=1G
    max_allowed_packet=256M
    max_binlog_size=256M
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci
    log_bin_trust_function_creators=1

  # Metrics
  metrics:
    enabled: true
    exporter:
      image: prom/mysqld-exporter:v0.18.0
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi
      port: 9104
    serviceMonitor:
      prometheusRelease: prometheus
      interval: 30s
      scrapeTimeout: 25s

  # Database for Magento
  username: magento
  database: magento

  # App user password from secret
  passwordSecretKeyRef:
    name: hayden-mariadb-app
    key: password
    generate: false
