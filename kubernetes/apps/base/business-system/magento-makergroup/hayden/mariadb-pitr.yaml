---
# PhysicalBackup — base backup for PITR (Mariabackup to TrueNAS MinIO)
apiVersion: k8s.mariadb.com/v1alpha1
kind: PhysicalBackup
metadata:
  name: hayden-mariadb-backup
  namespace: business-system
spec:
  mariaDbRef:
    name: hayden-mariadb
  schedule:
    cron: "0 3 * * *"
    immediate: true
  maxRetention: 168h
  compression: gzip
  storage:
    s3:
      bucket: mariadb-binlog
      prefix: hayden/base/
      endpoint: 192.168.50.17:9000
      accessKeyIdSecretKeyRef:
        name: cnpg-minio-credentials
        key: ACCESS_KEY_ID
      secretAccessKeySecretKeyRef:
        name: cnpg-minio-credentials
        key: SECRET_ACCESS_KEY
---
# PointInTimeRecovery — continuous binlog archival on top of base backup
apiVersion: k8s.mariadb.com/v1alpha1
kind: PointInTimeRecovery
metadata:
  name: hayden-mariadb-pitr
  namespace: business-system
spec:
  physicalBackupRef:
    name: hayden-mariadb-backup
  compression: gzip
  archiveTimeout: 5m
  storage:
    s3:
      bucket: mariadb-binlog
      prefix: hayden/binlog/
      endpoint: 192.168.50.17:9000
      accessKeyIdSecretKeyRef:
        name: cnpg-minio-credentials
        key: ACCESS_KEY_ID
      secretAccessKeySecretKeyRef:
        name: cnpg-minio-credentials
        key: SECRET_ACCESS_KEY
