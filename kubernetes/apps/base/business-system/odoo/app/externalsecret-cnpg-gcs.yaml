---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-gcs-credentials
  namespace: business-system
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cnpg-gcs-credentials
    template:
      data:
        # CNPG googleCredentials.applicationCredentials expects full SA JSON key
        gcsCredentials: "{{ .gcsCredentials }}"
  dataFrom:
    - extract:
        # 1Password item: cnpg-gcs-credentials
        # Field: gcsCredentials (contains the full GCS service account JSON key)
        key: cnpg-gcs-credentials
