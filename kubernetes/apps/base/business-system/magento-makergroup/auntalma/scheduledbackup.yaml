---
# Daily physical backup using mariabackup (faster than logical dumps)
# Physical backups are required for future PITR when operator is upgraded
apiVersion: k8s.mariadb.com/v1alpha1
kind: PhysicalBackup
metadata:
  name: auntalma-mariadb-daily
  namespace: business-system
spec:
  mariaDbRef:
    name: auntalma-mariadb
  # Daily backup: 04:00 Melbourne time (AEDT)
  # 04:00 AEDT = 17:00 UTC (UTC+11 in summer)
  schedule:
    cron: "0 17 * * *"
    suspend: false
  # Maximum retention period for backups (30 days)
  maxRetention: "720h"
  # Storage configuration — GCS via S3-compatible API
  storage:
    s3:
      bucket: hayden-magento2-backups
      prefix: auntalma/mariadb-physical
      endpoint: storage.googleapis.com
      region: australia-southeast1
      accessKeyIdSecretKeyRef:
        name: auntalma-objstore
        key: accessKeyId
      secretAccessKeySecretKeyRef:
        name: auntalma-objstore
        key: secretAccessKey
  # Resources for backup job
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
