---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: unifi-alerts
spec:
  groups:
    - name: unifi.rules
      rules:
        # NOTE: UnPoller v2 metric names use "unpoller_" prefix.
        # Verify actual metric names after first deployment with:
        #   curl -s http://unpoller.observability:9130/metrics | grep -E "^unpoller_" | head -20
        # Then adjust these rules to match.

        - alert: UniFiDeviceOffline
          expr: unpoller_device_uptime_seconds == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "UniFi device {{ $labels.name }} is offline"
            description: "Device {{ $labels.name }} ({{ $labels.type }}) reports 0 uptime."

        - alert: UniFiHighClientCount
          expr: sum by (site_name) (unpoller_client_receive_bytes_total) > 0 and sum by (site_name) (count(unpoller_client_receive_bytes_total)) > 100
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High client count on site {{ $labels.site_name }}"
            description: "{{ $value }} clients connected. Check for rogue devices."

        - alert: UnPollerDown
          expr: up{job="unpoller"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "UnPoller is down"
            description: "Cannot scrape UnPoller metrics. Check UniFi controller connectivity."
