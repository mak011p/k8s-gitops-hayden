---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app odoo-staging
  namespace: business-system-staging
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: odoo-staging
  install:
    timeout: 15m
    replace: true
    crds: CreateReplace
    createNamespace: true
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    timeout: 15m
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
    cleanupOnFail: true
    crds: CreateReplace
  test:
    enable: false
  rollback:
    recreate: true
    force: true
    cleanupOnFail: true
  uninstall:
    keepHistory: false
  driftDetection:
    mode: enabled
  maxHistory: 3
  values:
    controllers:
      *app :
        replicas: 1
        strategy: Recreate
        initContainers:
          auto-upgrade:
            image:
              repository: ghcr.io/hayden-agencies/odoo
              tag: 18.0.20260301.0600-fd489bb@sha256:302a0a0b82bd4c9faf183a17f0f8d23cb231c268de151b9078ffb67bc88fc613
            command: ["sh", "-c"]
            args:
              - |
                set -e

                ADDONS_PATH="/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons/custom,/mnt/extra-addons/vendor-oca,/mnt/extra-addons/vendor-ventor,/mnt/enterprise-addons"
                DB_HOST="odoo-pg-staging-rw.business-system-staging.svc.cluster.local"

                cat > /tmp/upgrade.conf << EOF
                [options]
                db_host = ${DB_HOST}
                db_port = 5432
                db_user = $${POSTGRES_USER}
                db_password = $${POSTGRES_PASSWORD}
                addons_path = ${ADDONS_PATH}
                data_dir = /var/lib/odoo
                EOF
                sed -i 's/^[[:space:]]*//' /tmp/upgrade.conf

                # --- Step 1: Detect and install NEW modules only ---
                # Find all custom addon names on the filesystem
                FS_ADDONS=$(find /mnt/extra-addons/custom -maxdepth 2 -name '__manifest__.py' \
                  -exec dirname {} \; | xargs -n1 basename | sort)

                # Query DB for already-known modules (installed or uninstalled)
                DB_ADDONS=$(python3 -c "
                import psycopg2
                conn = psycopg2.connect(host='${DB_HOST}', port=5432,
                    user='$${POSTGRES_USER}', password='$${POSTGRES_PASSWORD}',
                    dbname='$${POSTGRES_DB}')
                cr = conn.cursor()
                cr.execute(\"SELECT name FROM ir_module_module\")
                print('\n'.join(r[0] for r in cr.fetchall()))
                conn.close()
                " 2>/dev/null || echo "")

                # Find modules on filesystem but not in DB = truly new
                NEW_ADDONS=""
                for mod in ${FS_ADDONS}; do
                  if ! echo "$${DB_ADDONS}" | grep -qx "$${mod}"; then
                    NEW_ADDONS="$${NEW_ADDONS:+$${NEW_ADDONS},}$${mod}"
                  fi
                done

                if [ -n "$${NEW_ADDONS}" ]; then
                  echo "Installing NEW modules: $${NEW_ADDONS}"
                  python3 -c "import sys; sys.setrecursionlimit(5000); from odoo.cli import main; main()" \
                    -c /tmp/upgrade.conf -d "$${POSTGRES_DB}" -i "$${NEW_ADDONS}" --stop-after-init --no-http
                else
                  echo "No new modules to install."
                fi

                # --- Step 2: Upgrade changed modules (checksum-based) ---
                echo "Running click-odoo-update (checksum-based upgrade)..."
                click-odoo-update -c /tmp/upgrade.conf -d "$${POSTGRES_DB}"
                echo "Init complete."
            env:
              - name: POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: odoo-pg-app
                    key: username
              - name: POSTGRES_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: odoo-pg-app
                    key: password
              - name: POSTGRES_DB
                valueFrom:
                  secretKeyRef:
                    name: odoo-pg-app
                    key: dbname
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                memory: 4Gi
        containers:
          app:
            image:
              repository: ghcr.io/hayden-agencies/odoo
              tag: 18.0.20260301.0600-fd489bb@sha256:302a0a0b82bd4c9faf183a17f0f8d23cb231c268de151b9078ffb67bc88fc613
            env:
              - name: POSTGRES_HOST
                value: odoo-pg-staging-rw.business-system-staging.svc.cluster.local
              - name: POSTGRES_PORT
                value: "5432"
              - name: POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: odoo-pg-app
                    key: username
              - name: POSTGRES_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: odoo-pg-app
                    key: password
              - name: POSTGRES_DB
                valueFrom:
                  secretKeyRef:
                    name: odoo-pg-app
                    key: dbname
              - name: ODOO_MASTER_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: odoo-app
                    key: ODOO_MASTER_PASSWORD
            args:
              - -c
              - /etc/odoo/odoo.conf
              - --load=web,queue_job
              - --db_user=$$(POSTGRES_USER)
              - --db_password=$$(POSTGRES_PASSWORD)
              - --db-filter=^$$(POSTGRES_DB)$$
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /web/health
                    port: 8071
                  initialDelaySeconds: 120
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /web/health
                    port: 8071
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                memory: 2Gi
    defaultPodOptions:
      labels:
        app.kubernetes.io/name: odoo-staging
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
      imagePullSecrets:
        - name: ghcr-pull
    service:
      app:
        controller: odoo-staging
        ports:
          http:
            port: 8069
          xmlrpc:
            port: 8071
          gevent:
            port: 8072
    persistence:
      filestore:
        existingClaim: odoo-filestore-staging
        globalMounts:
          - path: /var/lib/odoo
      config:
        type: configMap
        name: odoo-config
        globalMounts:
          - path: /etc/odoo/odoo.conf
            subPath: odoo.conf
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
