---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # External secrets
  - externalsecret-backup.yaml
  - externalsecret-apikeys.yaml
  # SOPS encrypted secrets
  - secret-magento-app.enc.age.yaml
  - secret-mariadb-app.enc.age.yaml
  - secret-mariadb-superuser.enc.age.yaml
  # Database
  - mariadb-cluster.yaml
  - mariadb-pitr.yaml
  - scheduledbackup.yaml
  # Redis cache
  - redis-statefulset.yaml
  # Storage
  - pvc-media.yaml
  - pvc-var.yaml
  # Configuration
  - configmap-nginx.yaml
  - configmap-php.yaml
  - configmap-env-php.yaml
  # Application
  - helmrelease.yaml
  - httproute.yaml
  - httproute-admin.yaml
  - securitypolicy.yaml
  - cronjob.yaml
  # Resilience
  # networkpolicy.yaml — disabled: CiliumNetworkPolicy (even ingress-only) triggers
  # Cilium eBPF conntrack UDP race causing ~20s DNS delays on health_check.php
  - pdb.yaml
  - hpa.yaml
  # Observability
  - podmonitor.yaml
  - prometheusrule.yaml
  # Backups (VolSync) - uncomment after creating restic secrets in 1Password
  # - replicationsource-media.yaml
  # - replicationsource-var.yaml
