---
# CiliumNetworkPolicy to restrict access to MCP servers.
# Uses Cilium-native policies to avoid the conntrack UDP race condition
# that causes ~45% DNS packet loss with vanilla Kubernetes NetworkPolicies.
# See: https://github.com/cilium/cilium/issues/24844
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: odoo-mcp-isolation
  namespace: ai-system
  labels:
    app.kubernetes.io/component: security
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: odoo-mcp
  ingress:
    # Allow traffic from kagent helm release pods (controller, ui, etc)
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/instance: kagent
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Allow traffic from kagent-managed agent pods (odoo-assistant, flux-troubleshooter, sendgrid-assistant)
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/part-of: kagent
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
  egress:
    # DNS resolution — target kube-dns directly via identity
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # PyPI (HTTPS) — uvx downloads mcp-server-odoo at startup
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Odoo XML-RPC (business-system namespace)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: business-system
      toPorts:
        - ports:
            - port: "8071"
              protocol: TCP
---
