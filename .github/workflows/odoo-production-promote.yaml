---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Odoo: Promote to Production"

# Triggered by Flux notification controller when odoo-staging HelmRelease reconciles successfully.
# The githubdispatch provider sends a repository_dispatch event with the HelmRelease details.
on:
  repository_dispatch:
    types:
      - "HelmRelease/*"

concurrency:
  group: odoo-production-promote
  cancel-in-progress: true

jobs:
  promote:
    name: Auto-merge Odoo Production PR
    runs-on: ubuntu-latest
    # Only act on odoo-staging HelmRelease success events
    if: |
      contains(github.event.client_payload.involvedObject.name, 'odoo-staging') &&
      github.event.client_payload.severity == 'info'
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Find and merge Odoo production PR
        env:
          GH_TOKEN: "${{ steps.app-token.outputs.token }}"
        run: |
          echo "::notice::Odoo staging reconciliation succeeded, looking for production PR..."

          # Find open Renovate PR for odoo-production
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --head "renovate/odoo-production" \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "::notice::No open Odoo production PR found — nothing to merge."
            exit 0
          fi

          echo "::notice::Found Odoo production PR #${PR_NUMBER}"

          # Always attempt to update the PR branch — branch protection requires
          # it to be up-to-date, and mergeable_state can be "unknown" if GitHub
          # hasn't computed it yet. The update-branch call is a no-op if already
          # current, so it's safe to call unconditionally.
          echo "::notice::Ensuring PR branch is up-to-date with master..."
          gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/update-branch" \
            -X PUT -f update_method="merge" 2>&1 || true
          # Give GitHub time to register the merge commit and trigger CI
          sleep 10

          # Wait for CI checks to pass (poll every 15s for up to 10 minutes)
          echo "Waiting for CI checks on PR #${PR_NUMBER}..."
          ATTEMPTS=0
          MAX_ATTEMPTS=40
          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            ATTEMPTS=$((ATTEMPTS + 1))
            if gh pr checks "$PR_NUMBER" --repo "${{ github.repository }}" --fail-fast 2>/dev/null; then
              echo "::notice::CI checks passed, merging PR #${PR_NUMBER}..."
              gh pr merge "$PR_NUMBER" \
                --repo "${{ github.repository }}" \
                --squash \
                --delete-branch \
                --admin
              echo "::notice::Odoo production PR #${PR_NUMBER} merged successfully!"
              exit 0
            fi
            echo "Checks not passing yet (attempt ${ATTEMPTS}/${MAX_ATTEMPTS}), waiting 15s..."
            sleep 15
          done

          echo "::error::CI checks did not pass within 10 minutes on PR #${PR_NUMBER} — not merging."
          exit 1
