---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ipmi-exporter
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ipmi-exporter
  egress:
    # Allow DNS resolution
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Allow IPMI over LAN (RMCP+) to Servers VLAN for BMC devices
    - toCIDR:
        - 192.168.50.0/24
      toPorts:
        - ports:
            - port: "623"
              protocol: UDP
  ingress:
    # Allow Prometheus scraping
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9290"
              protocol: TCP
