---
# CiliumNetworkPolicy for hayden Magento pods — ingress only
# Vanilla K8s NetworkPolicy causes DNS packet loss on Cilium (eBPF conntrack race)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: hayden-app
  namespace: business-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: hayden
  ingress:
    # Envoy Gateway proxy pods
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network-system
            gateway.envoyproxy.io/owning-gateway-name: envoy-external
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Prometheus metrics scraping
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
